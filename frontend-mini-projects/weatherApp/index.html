<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-project</title>
     <link href="/src/style.css" rel="stylesheet">
  </head>
  <body>
    <div id="app">

      <div class="min-h-screen bg-linear-to-br from-sky-500 via-blue-600 to-indigo-700 flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- Search Box -->
    <div class="backdrop-blur-lg bg-white/20 border border-white/30 rounded-3xl p-5 shadow-2xl">
      <h1 class="text-3xl font-bold text-white text-center mb-5">
        🌤 Weather App
      </h1>

      <div class="flex gap-3">
        <input
          id="city-input"
          type="text"
          placeholder="Search city..."
          class="flex-1 px-4 py-3 rounded-xl bg-white/80 outline-none focus:ring-2 focus:ring-white"
        />

        <button
          id="search-btn"
          class="px-5 py-3 bg-white text-blue-600 font-semibold rounded-xl hover:scale-105 transition duration-300"
        >
          Search
        </button>
      </div>
    </div>

    <!-- Current Weather -->
    <div class="mt-6 backdrop-blur-lg bg-white/20 border border-white/30 rounded-3xl p-6 shadow-2xl text-white">

      <di class="flex items-center justify-between">
      
        <div>
          <h2 id="city" class="text-3xl font-bold">
            Shahjahanpur
          </h2>
          <p id="condition" class="text-lg text-gray-200">
            
          </p>
        </div>

        
     <div class="flex items-center justify-center">
  <img
    id="condition-icon"
    src=""
    alt="Weather Icon"
    class="w-20 h-20"
  />
</div>
      
      </div>

      <div class="mt-6">
        <h1 id="temperature" class="text-6xl font-bold">
          25°
        </h1>
      </div>

      <!-- Extra Info -->
      <div class="grid grid-cols-3 gap-4 mt-6 text-center">

        <div class="bg-white/10 rounded-xl p-3">
          <p class="text-sm text-gray-300">Humidity</p>
             <p id="humidity-label" class=" font-semibold"></p>

        </div>

        <div class="bg-white/10 rounded-xl p-3">
          <p class="text-sm text-gray-300">Wind</p>
          <p id="wind-label" class="font-semibold">12 km/h</p>
        </div>

        <div class="bg-white/10 rounded-xl p-3">
          <p class="text-sm text-gray-300">Feels Like</p>
          <p id="feels-like" class="font-semibold">27°</p>
        </div>

      </div>
    </div>

    <!-- Forecast -->
   
  

    <!-- Last Updated -->
    

  </div>

</div>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
